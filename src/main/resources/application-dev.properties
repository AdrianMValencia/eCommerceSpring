spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/eCommerceDb
spring.datasource.username=postgres
spring.datasource.password=amechato

spring.jpa.hibernate.ddl-auto=update
spring.jpa.sql-show=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------
# PAYPAL + NGROK (ENTORNO LOCAL)
# -----------------------------
# 1) Base URL Sandbox de PayPal Checkout API.
# 2) Credenciales sacadas de developer.paypal.com -> Apps & Credentials.
# 3) webhook-id se obtiene al crear un webhook en la app sandbox.
# 4) return-url y cancel-url son rutas del frontend React.
# 5) Para webhook local usar ngrok: `ngrok http 8080`.
#    Luego registrar en PayPal esta URL publica:
#    https://<tu-dominio-ngrok>/api/payments/paypal/webhook
# 6) currency debe ser una moneda habilitada en tu cuenta (USD validado en este proyecto).
paypal.base-url=https://api-m.sandbox.paypal.com
paypal.client-id=PONER_AQUI_TU_CLIENT_ID_SANDBOX
paypal.client-secret=PONER_AQUI_TU_CLIENT_SECRET_SANDBOX
paypal.webhook-id=PONER_AQUI_TU_WEBHOOK_ID_SANDBOX
paypal.return-url=http://localhost:5173/checkout/paypal/success
paypal.cancel-url=http://localhost:5173/checkout/paypal/cancel
paypal.currency=USD

# -----------------------------
# JWT (ENTORNO LOCAL)
# -----------------------------
# 1) secret firma los tokens de login.
# 2) Debe tener 32+ caracteres para HMAC seguro.
# 3) expiration-ms define vigencia del token (86400000 = 24 horas).
jwt.secret=dev-super-secret-key-change-this-to-at-least-32-chars
jwt.expiration-ms=86400000